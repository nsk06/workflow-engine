apiVersion: v1
kind: Namespace
metadata:
  name: workflow-system
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: workflow-sqlite-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /var/lib/workflow-sqlite
    type: DirectoryOrCreate
  storageClassName: manual
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: workflow-sqlite-pvc
  namespace: workflow-system
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-api
  namespace: workflow-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: workflow-api
  template:
    metadata:
      labels:
        app: workflow-api
    spec:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - workflow-api
                      - workflow-worker
              topologyKey: kubernetes.io/hostname
      containers:
        - name: api
          image: workflow-engine:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: sqlite:////data/workflow.db
            - name: AUTH_DISABLED
              value: "false"
            - name: JWT_SECRET
              value: workflow-demo-secret
            - name: DEMO_USERS
              value: demo:demo,alice:alice,bob:bob
            - name: OTEL_ENABLED
              value: "true"
            - name: OTEL_EXPORTER_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4317
          volumeMounts:
            - name: workflow-db
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
      volumes:
        - name: workflow-db
          persistentVolumeClaim:
            claimName: workflow-sqlite-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: workflow-api
  namespace: workflow-system
  labels:
    app: workflow-api
spec:
  selector:
    app: workflow-api
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-worker
  namespace: workflow-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: workflow-worker
  template:
    metadata:
      labels:
        app: workflow-worker
    spec:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - workflow-api
                      - workflow-worker
              topologyKey: kubernetes.io/hostname
      containers:
        - name: worker
          image: workflow-engine:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.run_worker"]
          env:
            - name: DATABASE_URL
              value: sqlite:////data/workflow.db
            - name: WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OTEL_ENABLED
              value: "true"
            - name: OTEL_EXPORTER_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4317
          volumeMounts:
            - name: workflow-db
              mountPath: /data
      volumes:
        - name: workflow-db
          persistentVolumeClaim:
            claimName: workflow-sqlite-pvc
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: workflow-worker-hpa
  namespace: workflow-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: workflow-worker
  minReplicas: 1
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-ui
  namespace: workflow-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: workflow-ui
  template:
    metadata:
      labels:
        app: workflow-ui
    spec:
      containers:
        - name: ui
          image: workflow-ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: workflow-ui
  namespace: workflow-system
spec:
  selector:
    app: workflow-ui
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: workflow-ingress
  namespace: workflow-system
spec:
  ingressClassName: nginx
  rules:
    - host: localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: workflow-ui
                port:
                  number: 80
